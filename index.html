    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              navy: {
                950: '#050A18',
                900: '#0B1221',
                800: '#1E293B',
                700: '#334155',
              },
              slate: {
                850: '#151e2e',
                900: '#0f172a',
                950: '#020617',
              }
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }

    <style>
      body {
        font-family: 'Inter', sans-serif;
        color: #f8fafc;
        background-color: #050A18;
      }
      
      /* Grid Background Pattern */
      .bg-grid-pattern {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(49, 46, 129, 0.1) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(49, 46, 129, 0.1) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }

      /* Full page grid for specific sections - UPDATED to Indigo */
      .bg-grid-indigo {
        background-size: 50px 50px;
        /* Decreased opacity for subtle visibility using indigo-500 rgba(99, 102, 241) */
        background-image: linear-gradient(to right, rgba(99, 102, 241, 0.06) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
      }
      
      .animate-entry {
        animation: fadeInUpBlur 1s cubic-bezier(0.2,0.8,0.2,1) both;
      }
      @keyframes fadeInUpBlur{
        0% { opacity:0; transform:translateY(20px); filter:blur(10px) }
        100% { opacity:1; transform:translateY(0); filter:blur(0) }
      }

      /* Custom Dark Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #050A18; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1E293B; 
        border-radius: 5px;
        border: 2px solid #050A18;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; 
      }
    </style>
