    content="Driving practical AI adoption through a connected ecosystem that delivers measurable business results." />
  <meta property="twitter:image" content="/og-image.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Preload Unicorn Studio Script -->
  <link rel="preload"
    href="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js" as="script">
  <script src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            navy: {
              950: '#050A18',
              900: '#0B1221',
              800: '#1E293B',
              700: '#334155',
            },
            slate: {
              850: '#151e2e',
              900: '#0f172a',
              950: '#020617',
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      color: #f8fafc;
      background-color: #050A18;
    }

    /* Grid Background Pattern */
    .bg-grid-pattern {
      background-size: 40px 40px;
      background-image: linear-gradient(to right, rgba(49, 46, 129, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(49, 46, 129, 0.1) 1px, transparent 1px);
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    /* Full page grid for specific sections - UPDATED to Indigo */
    .bg-grid-indigo {
      background-size: 50px 50px;
      /* Decreased opacity for subtle visibility using indigo-500 rgba(99, 102, 241) */
      background-image: linear-gradient(to right, rgba(99, 102, 241, 0.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(99, 102, 241, 0.06) 1px, transparent 1px);
    }

    .animate-entry {
      animation: fadeInUpBlur 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes fadeInUpBlur {
      0% {
        opacity: 0;
        transform: translateY(20px);
        filter: blur(10px)
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0)
      }
    }

    /* Custom Dark Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #050A18;
    }

    ::-webkit-scrollbar-thumb {
      background: #1E293B;
      border-radius: 5px;
      border: 2px solid #050A18;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }

    /* =========================================
         AqionFlo Custom CSS
         ========================================= */
    :root {
      --background: 220 35% 5%;
      --foreground: 225 30% 97%;
      --card: 220 30% 8%;
      --card-foreground: 225 30% 97%;
      --popover: 220 30% 8%;
      --popover-foreground: 225 30% 97%;
      --primary: 158 78% 55%;
      --primary-foreground: 220 35% 5%;
      --secondary: 220 25% 12%;
      --secondary-foreground: 225 30% 97%;
      --muted: 220 20% 15%;
      --muted-foreground: 220 15% 65%;
      --accent: 158 78% 55%;
      --accent-foreground: 220 35% 5%;
      --destructive: 0 84% 60%;
      --destructive-foreground: 0 0% 98%;
      --border: 220 20% 18%;
      --input: 220 20% 15%;
      --ring: 158 78% 55%;
      --radius: 1rem;
    }

    .glass-panel {
      background: rgba(244, 247, 255, 0.06);
      border: 1px solid rgba(244, 247, 255, 0.12);
      border-radius: 22px;
      backdrop-filter: blur(16px) saturate(115%);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .glass-panel-hover:hover {
      border-color: rgba(244, 247, 255, 0.22);
    }

    .pill {
      background: rgba(244, 247, 255, 0.08);
      border: 1px solid rgba(244, 247, 255, 0.14);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #A7B1C8;
      transition: all 0.2s ease;
    }

    .pill:hover {
      background: rgba(244, 247, 255, 0.12);
      border-color: rgba(244, 247, 255, 0.2);
    }

    .btn-primary {
      background: #2EE9A8;
      color: #070B14;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 24px rgba(46, 233, 168, 0.3);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      color: #F4F7FF;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(244, 247, 255, 0.2);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: rgba(244, 247, 255, 0.08);
      border-color: rgba(244, 247, 255, 0.3);
      transform: translateY(-2px);
    }

    .text-gradient {
      background: linear-gradient(135deg, #2EE9A8 0%, #1DB584 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-pinned {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .bg-cinematic {
      position: absolute;
      inset: 0;
      object-fit: cover;
      filter: saturate(0.85) contrast(1.05);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7, 11, 20, 0.35), rgba(7, 11, 20, 0.65));
    }

    .grain-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      z-index: 9999;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #2EE9A8;
      margin-bottom: 16px;
    }

    .headline {
      font-size: clamp(34px, 3.6vw, 52px);
      font-weight: 600;
      color: #F4F7FF;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .body-text {
      font-size: clamp(15px, 1.2vw, 18px);
      line-height: 1.6;
      color: #A7B1C8;
    }

    .link-arrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #2EE9A8;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .link-arrow:hover {
      gap: 12px;
    }

    .dashboard-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    .annotation-dot {
      width: 12px;
      height: 12px;
      background: #2EE9A8;
      border-radius: 50%;
      position: relative;
    }

    .annotation-dot::after {
      content: '';
      position: absolute;
      inset: -6px;
      border: 2px solid #2EE9A8;
      border-radius: 50%;
      animation: pulse-ring 3s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    .text-balance {
      text-wrap: balance;
    }

    ::selection {
      background: rgba(46, 233, 168, 0.3);
      color: #F4F7FF;
    }
  </style>
  <script type="importmap">
{

    "vite": "https://esm.sh/vite@^7.3.1",

    "clsx": "https://esm.sh/clsx@2.1.0",

    "class-variance-authority": "https://esm.sh/class-variance-authority@0.7.0",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@1.0.2",

  }
}
</script>
</head>

  <div id="root"></div>

</html>
